<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#6366f1" stroke-width="2.5" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="27" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5"/>
  <!-- Crosshair lines -->
  <line x1="50" y1="10" x2="50" y2="90" stroke="#6366f1" stroke-width="1" opacity="0.25"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="#6366f1" stroke-width="1" opacity="0.25"/>
  <!-- Tick marks -->
  <line x1="50" y1="10" x2="50" y2="17" stroke="#a5b4fc" stroke-width="3"/>
  <line x1="50" y1="83" x2="50" y2="90" stroke="#a5b4fc" stroke-width="3"/>
  <line x1="10" y1="50" x2="17" y2="50" stroke="#a5b4fc" stroke-width="3"/>
  <line x1="83" y1="50" x2="90" y2="50" stroke="#a5b4fc" stroke-width="3"/>
  <!-- Corner dots -->
  <circle cx="50" cy="10" r="3" fill="#818cf8"/>
  <circle cx="50" cy="90" r="3" fill="#818cf8"/>
  <circle cx="10" cy="50" r="3" fill="#818cf8"/>
  <circle cx="90" cy="50" r="3" fill="#818cf8"/>
  <!-- Center circle background -->
  <circle cx="50" cy="50" r="18" fill="#1e293b"/>
  <!-- Big bold G -->
  <text x="50" y="59" 
        text-anchor="middle" 
        font-family="Arial Black, Impact, sans-serif" 
        font-size="28" 
        font-weight="900" 
        fill="url(#glow)">G</text>
</svg>